<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="_csrf" th:content="${_csrf.token}" />
	<meta name="_csrf_header" th:content="${_csrf.headerName}" />
	<title>受注一覧 - 販売管理システム</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body {
			background-color: #f8f9fa;
		}
	</style>
</head>

<body>

	<div class="container mt-5">
		<div class="card shadow-sm p-4">
			<h2 class="mb-4">📋 受注一覧</h2>

			<div class="row g-3 mb-4">
				<div class="col-auto">
					<select id="yearSelect" class="form-select">
						<option value="2025">2025年</option>
						<option value="2026" selected>2026年</option>
					</select>
				</div>
				<div class="col-auto">
					<select id="monthSelect" class="form-select">
						<option value="0">全期間</option>
						<option value="4">4月</option>
						<option value="5">5月</option>
						<option value="6">6月</option>
					</select>
				</div>
			</div>

			<div class="table-responsive">
				<table class="table table-striped table-hover table-bordered align-middle">
					<thead class="table-success">
						<tr>
							<th>受注日時</th>
							<th>ID</th>
							<th>商品名</th>
							<th>カテゴリ</th>
							<th>単価</th>
							<th>数量</th>
							<th>小計</th>
							<th>操作</th>
							<th>売掛登録</th>
						</tr>
					</thead>
					<tbody id="orderTableBody">
						<tr th:each="order : ${orderList}">
							<td th:text="${#temporals.format(order.orderDate, 'yyyy/MM/dd HH:mm')}"></td>
							<td th:text="${order.id}"></td>
							<td th:text="${order.productName}"></td>
							<td th:text="${order.categoryName}"></td>
							<td th:text="${#numbers.formatInteger(order.price, 3, 'COMMA')} + '円'"></td>
							<td th:text="${order.quantity}"></td>
							<td th:text="${#numbers.formatInteger(order.price * order.quantity, 3, 'COMMA')} + '円'">
							</td>
							<td>
								<button type="button" class="btn btn-sm btn-outline-danger"
									th:onclick="'sendRequest(\'/order/list/delete\', ' + ${order.id} + ')'">削除</button>
							</td>
							<td>
								<button type="button" class="btn btn-sm btn-outline-primary"
									th:if="${order.status == 0}"
									th:onclick="'sendRequest(\'/order/list/register\', ' + ${order.id} + ')'">売掛登録</button>
								<span th:if="${order.status != 0}" class="badge bg-secondary">登録済</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>

			<div class="mt-3">
				<a th:href="@{/order}" class="btn btn-outline-secondary">受注伝票に戻る</a>
			</div>
		</div>
	</div>

	<script>
		function updateTable() {
			const year = document.getElementById('yearSelect').value;
			const month = document.getElementById('monthSelect').value;

			// 手形（トークン）を取得
			const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
			const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

			// 表を更新
			fetch(`/order/list/filter?year=${year}&month=${month}`)
				.then(response => response.json())
				.then(data => {
					const tbody = document.getElementById('orderTableBody');
					tbody.innerHTML = '';

					data.forEach(order => {
						const date = new Date(order.orderDate);
						const dateStr = date.toLocaleString('ja-JP', {year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'});

						// 登録ボタンの表示（statusが0ならボタン、それ以外なら「登録済」）
						const registerButton = (parseInt(order.status) === 0)
							? `<button type="button" class="btn btn-sm btn-outline-primary" onclick="sendRequest('/order/list/register', ${order.id})">売掛登録</button>`
							: '<span class="badge bg-secondary">登録済</span>';
						const deleteBtn = `<button type="button" class="btn btn-sm btn-outline-danger" onclick="sendRequest('/order/list/delete', ${order.id})">削除</button>`;
						
						const row = `<tr>
	                        <td>${dateStr}</td>
	                        <td>${order.id}</td>
	                        <td>${order.productName}</td>
	                        <td>${order.categoryName}</td>
	                        <td>${order.price.toLocaleString()}円</td>
	                        <td>${order.quantity}</td>
	                        <td>${(order.price * order.quantity).toLocaleString()}円</td>
	                        <td>${deleteBtn}</td>
	                        <td>${registerButton}</td>
	                    </tr>`;
						tbody.insertAdjacentHTML('beforeend', row);
					});
				});
		}

		// ★これが「手形」を添えてサーバーに送る関数です
		function sendRequest(url, id) {
			if (!confirm('実行しますか？')) return;

			const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
			const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

			fetch(url, {
				method: 'POST',
				headers: {
					'Content-Type': 'application/x-www-form-urlencoded',
					[csrfHeader]: csrfToken // ここで手形を渡している
				},
				body: `id=${id}`
			}).then(() => {
				location.reload(); // 成功したら画面をリロードして最新にする
			});
		}

		document.getElementById('yearSelect').addEventListener('change', updateTable);
		document.getElementById('monthSelect').addEventListener('change', updateTable);
	</script>
</body>

</html>
