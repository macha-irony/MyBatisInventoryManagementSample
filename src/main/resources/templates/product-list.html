<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>商品一覧 - 販売管理システム</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body {
			background-color: #f8f9fa;
		}
	</style>
</head>

<body>

	<div class="container mt-5">
		<div class="card shadow-sm p-4">
			<h2 class="mb-4">📦 商品一覧</h2>

			<div class="table-responsive">
				<table class="table table-striped table-hover table-bordered align-middle">
					<thead class="table-success">
						<tr>
							<th>ID</th>
							<th>商品名</th>
							<th>カテゴリ</th>
							<th>価格</th>
							<th>登録日時</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="product : ${products}">
							<td th:text="${product.id}">1</td>
							<td th:text="${product.name}">商品名</td>
							<td th:text="${product.categoryName}">カテゴリ</td>
							<td th:text="${#numbers.formatInteger(product.price, 1, 'COMMA')} + '円'">0円</td>
							<td th:text="${#temporals.format(product.createdAt, 'yyyy/MM/dd HH:mm')}">2026/01/01</td>
						</tr>
					</tbody>
				</table>
			</div>

			<div class="mt-3">
				<a th:href="@{/}" class="btn btn-outline-secondary">メニューに戻る</a>
			</div>
		</div>
	</div>

</body>

</html>
