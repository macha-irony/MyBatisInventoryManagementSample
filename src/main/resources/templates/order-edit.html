<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>受注編集 - 販売管理システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card p-4">
            <h2>✏️ 受注伝票の編集</h2>
            <form th:action="@{/order/update}" method="post" th:object="${order}">
                <input type="hidden" th:field="*{id}">
                
                <div class="mb-3">
                    <label>商品名</label>
                    <select th:field="*{productId}" class="form-select">
                        <option th:each="p : ${productList}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label>数量</label>
                    <input type="number" th:field="*{quantity}" class="form-control">
                </div>
                
                <button type="submit" class="btn btn-primary">更新する</button>
                <a th:href="@{/order/list}" class="btn btn-secondary">戻る</a>
            </form>
        </div>
    </div>
</body>
</html>
