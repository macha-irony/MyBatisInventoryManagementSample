<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>発注登録- 販売管理システム</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body {
			background-color: #f8f9fa;
		}
	</style>
</head>

<body>
	<div class="container mt-5">
		<div class="card shadow-sm p-4" style="max-width: 800px; margin: auto;">
			<h2 class="mb-4">📋 発注登録画面</h2>

			<form th:action="@{/purchase/insertPurchase}" th:object="${purchaseForm}" method="post"
				onsubmit="return confirm('発注内容を保存します');">
				<div class="mb-3">
				                <label for="productId" class="form-label">商品名</label>
				                <select th:field="*{productId}" id="productId" class="form-select">
				                    <option value="">-- 選択してください --</option>
				                    <option th:each="product : ${productList}" th:value="${product.id}" th:text="${product.name}"></option>
				                </select>
				                <div th:if="${#fields.hasErrors('productId')}" th:errors="*{productId}" class="text-danger small mt-1"></div>
				            </div>

				            <div class="mb-4">
				                <label for="quantity" class="form-label">注文数</label>
				                <input type="number" th:field="*{quantity}" id="quantity" class="form-control" min="1" placeholder="数量を入力">
				                <div th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}" class="text-danger small mt-1"></div>
				            </div>

				            <div class="d-grid gap-2">
				                <button type="submit" class="btn btn-warning btn-lg">発注を確定する</button>
				            </div>
				        </form>

				        <hr class="my-4">

				        <div class="d-grid gap-2">
				            <a th:href="@{/purchase/list}" class="btn btn-outline-secondary">すべての発注を確認する</a>
				            <a th:href="@{/}" class="btn btn-outline-secondary">メニューに戻る</a>
				        </div>
				    </div>
				</div>
</body>

</html>
