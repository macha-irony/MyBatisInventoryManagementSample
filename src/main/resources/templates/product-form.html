<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品新規登録</title>
    <style>
        .form-container { width: 400px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn-submit { background-color: #007bff; color: white; border: none; padding: 10px 15px; cursor: pointer; width: 100%; border-radius: 3px; }
        .btn-back { display: block; text-align: center; margin-top: 10px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>📦 商品新規登録</h2>
    
    <form th:action="@{/products/add}" th:object="${productForm}" method="post">
        
        <div class="form-group">
            <label for="name">商品名</label>
            <input type="text" id="name" th:field="*{name}" required placeholder="例：マイルドブレンドコーヒー">
        </div>
        
        <div class="form-group">
            <label for="categoryId">カテゴリ</label>
            <select id="categoryId" th:field="*{categoryId}" required>
                <option value="">選択してください</option>
                <option value="1">食品</option>
                <option value="2">衣服</option>
                <option value="3">雑貨</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="price">価格（円）</label>
            <input type="number" id="price" th:field="*{price}" required min="0" placeholder="例：1200">
        </div>
        
        <button type="submit" class="btn-submit">登録する</button>
    </form>
    
    <a href="/products" class="btn-back">一覧に戻る</a>
</div>

</body>
</html>
