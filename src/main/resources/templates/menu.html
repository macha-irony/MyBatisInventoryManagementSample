<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>販売管理システム - メニュー</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body {
			background-color: #f8f9fa;
		}

		.menu-card {
			max-width: 700px;
			margin: 50px auto;
			position: relative;
		}

		/* 右上配置用のスタイル */
		.top-right-nav {
			position: absolute;
			top: -40px;
			right: 0;
		}

		.weather-info {
			position: fixed;
			top: 15px;
			left: 15px;
			display: flex;
			align-items: center;
			/* アイコンと文字を上下中央に揃える */
			background: #ffffff;
			padding: 5px 12px;
			border-radius: 30px;
			box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
			z-index: 9999;
		}

		.weather-info img {
			width: 32px;
			height: 32px;
		}

		.weather-text {
			display: flex;
			align-items: baseline;
			/* 文字のベースラインを揃える */
			gap: 6px;
			margin-left: 5px;
		}

		.location {
			font-size: 13px;
			color: #555;
		}

		.temp {
			font-size: 15px;
			font-weight: bold;
			color: #333;
		}
	</style>
</head>

<body>

	<div class="container menu-card">
		<div class="top-right-nav d-flex gap-2 align-items-center">
			<span sec:authorize="isAuthenticated()" class="text-muted">
				ようこそ、<span sec:authentication="name">ユーザー</span>さん
			</span>
			<a th:href="@{/profile}" class="btn btn-sm btn-outline-dark">👤 マイページ</a>
			<form th:action="@{/logout}" method="post">
				<button type="submit" class="btn btn-sm btn-outline-danger">🚪 ログアウト</button>
			</form>
		</div>

		<div class="weather-info" th:if="${weather != null}">
			<img th:src="@{'http://openweathermap.org/img/wn/' + ${weather.weather[0].icon} + '.png'}" alt="Icon">

			<div class="weather-text">
				<span class="location" th:text="${weather.name}"></span>
				<span class="location" th:text="${weather.weather[0].description}"></span>
				<!--					<span class="main" th:text="${weather.weather[0].main}"></span>-->
				<span class="temp" th:text="${weather.main.temp} + '℃'"></span>
			</div>
		</div>

		<div class="card shadow-sm p-5">
			<div class="text-center mb-5">
				<h1 class="h2">📦 販売管理システム</h1>
				<p class="text-muted">行う操作を選択してください</p>
			</div>

			<div class="d-grid gap-4">
				<div class="row g-3">
					<div class="col-6">
						<a th:href="@{/products/add}"
							class="btn btn-outline-primary w-100 h-100 d-flex align-items-center justify-content-center">➕
							新しい商品を登録する</a>
					</div>
					<div class="col-6">
						<a th:href="@{/products}"
							class="btn btn-success shadow-sm w-100 h-100 d-flex align-items-center justify-content-center">🔍
							商品全件検索（一覧）</a>
					</div>
				</div>

				<div class="row g-3">
					<div class="col-6">
						<a th:href="@{/order}" class="btn btn-primary shadow-sm w-100 py-3">📋 受注伝票</a>
					</div>
					<div class="col-6">
						<a th:href="@{/purchase}" class="btn btn-warning shadow-sm w-100 py-3">📝 発注伝票</a>
					</div>
				</div>

				<div class="row">
					<div class="col-12">
						<a th:href="@{/products/stock}" class="btn btn-secondary shadow-sm w-100">📉 入出庫の管理</a>
					</div>
				</div>
			</div>
		</div>
	</div>

</body>

</html>
