<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>販売管理システム - メニュー</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body {
			background-color: rgb(255, 255, 255);
		}

		.menu-card {
			max-width: 500px;
			margin: 50px auto;
		}
	</style>
</head>

<body>

	<div class="container menu-card">
		<div class="card shadow-sm p-4">
			<div class="text-end mb-3">
				<span sec:authorize="isAuthenticated()" class="badge bg-secondary">
					ようこそ、<span sec:authentication="name">ユーザー</span>さん
				</span>
			</div>

			<div class="text-center mb-4">
				<h1 class="h3">📦 販売管理システム</h1>
				<p class="text-muted">行う操作を選択してください</p>
			</div>

			<hr>

			<div class="d-grid gap-3">
				<a th:href="@{/products/add}" class="btn btn-outline-primary">➕ 新しい商品を登録する</a>
				<a th:href="@{/products}" class="btn btn-success shadow-sm">🔍 商品全件検索（一覧）</a>
				<a th:href="@{/order}" class="btn btn-primary shadow-sm">📋 受注伝票</a>
				<a th:href="@{/purchase}" class="btn btn-warning shadow-sm">📝 発注伝票</a>
				<a th:href="@{/products/stock}" class="btn btn-secondary shadow-sm">📉 入出庫の管理</a>
				<hr>
				<a th:href="@{/profile}" class="btn btn-outline-dark">👤 マイページへ</a>

				<form th:action="@{/logout}" method="post" class="d-grid">
					<button type="submit" class="btn btn-outline-danger">🚪 ログアウト</button>
				</form>
			</div>
		</div>
	</div>

</body>

</html>
