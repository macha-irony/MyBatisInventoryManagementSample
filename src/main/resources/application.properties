spring.application.name=MyBatisInventoryManagementSample
# 1. データベース接続設定 (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=kunnrenn
spring.datasource.driver-class-name=org.postgresql.Driver

mybatis.mapper-locations=classpath:com/example/demo/mapper/*.xml

# [追加] 組み込みDB（H2など）以外のデータベース（PostgreSQLなど）でもschema.sqlを自動実行させる設定
spring.sql.init.mode=always

# [任意・推奨] もしデータ挿入用の data.sql も将来使う場合、テーブル作成（schema.sql）の完了を待ってから実行する設定
spring.sql.init.defer-datasource-initialization=true

# [重要] DBのスネークケース(created_at)とJavaのキャメルケース(createdAt)を自動接続する
mybatis.configuration.map-underscore-to-camel-case=true

# コンソール上にMyBatisが発行した生のSQL文とパラメータを出力させ、デバッグをしやすくする設定
logging.level.com.example.demo.mapper=DEBUG

# 自分のパッケージのログを詳細（DEBUG）まで出力する
logging.level.com.example.demo=DEBUG

# SQLの具体的な内容を確認したい場合の設定
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

logging.level.org.springframework.security=DEBUG